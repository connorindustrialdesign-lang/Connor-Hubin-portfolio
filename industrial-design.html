<!doctype html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Industrial Design — Connor Hubin</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .category-wrap { max-width: 1200px; margin: 0 auto; padding: 32px 20px 60px; }
      .category-wrap h2 { margin: 0 0 8px; position: absolute; left: -9999px; }
      .category-wrap p { margin: 0 0 28px; color: var(--muted); position: absolute; left: -9999px; }
      .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; }
      .cat-card { display: block; position: relative; aspect-ratio: 1 / 1; border-radius: 12px; overflow: hidden; text-decoration: none; color: inherit; background: #f2f2f2; }
      .cat-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
      @media (max-width: 900px) { .cat-grid { grid-template-columns: repeat(2, 1fr); } }
      @media (max-width: 640px) { .cat-grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body data-page="industrial-design">

              <circle cx="12" cy="8" r="1.5"/>
              <path d="M12 11v6"/>
            </svg>
          </a>
        </nav>
      </div>
    </header>
